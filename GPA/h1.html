<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>GPA Calculator</title>
    <link rel="stylesheet" href="c1.css">
</head>
<body>
    <!-- Animated background elements -->
    <div class="animated-bg">
        <div class="hexagram"></div>
        <div class="hexagram"></div>
        <div class="hexagram"></div>
        <div class="hexagram"></div>
        <div class="hexagram"></div>
        <div class="hexagram"></div>
    </div>
    
    <div class="container">
        <h1>GPA Calculator</h1>
        
        <form id="gpaForm">
            <h2>Add Your Previous GPA Details</h2>
            <div class="input-group">
                <label>Previous GPA:</label>
                <input type="number" step="0.01" name="previousGPA" required>
                <label>Previous Total Credits:</label>
                <input type="number" name="previousCredits" required>
            </div>
            
            <h2>Add Current Courses</h2>
            <div class="course-input">
                <div class="input-group">
                    <label>Course Name:</label>
                    <input type="text" name="courseName" placeholder="Enter course name" required>
                </div>
                <div class="input-group">
                    <label>Grade:</label>
                    <select name="grade" required>
                        <option value="">Select Grade</option>
                        <option value="A+">A+</option>
                        <option value="A">A</option>
                        <option value="B+">B+</option>
                        <option value="B">B</option>
                        <option value="C+">C+</option>
                        <option value="C">C</option>
                        <option value="D+">D+</option>
                        <option value="D">D</option>
                        <option value="F">F</option>
                    </select>
                </div>
                <div class="input-group">
                    <label>Credit Hours:</label>
                    <input type="number" name="credits" min="1" max="6" required>
                </div>
            </div>
            
            <div class="button-group">
                <button type="button" onclick="addCourse()" class="btn btn-primary">Add Course</button>
                <button type="button" onclick="calculateGPA()" class="btn btn-calculate">CALCULATE</button>
                <button type="button" onclick="resetForm()" class="btn btn-reset">RESET</button>
            </div>
        </form>
        
        <div class="courses-list">
            <h3>Added Courses</h3>
            <div id="coursesDisplay"></div>
        </div>
        
        <div class="results">
            <div class="result-item">
                <span class="result-label">Total Credit Hours:</span>
                <span id="totalCredits" class="result-value">0</span>
            </div>
            <div class="result-item">
                <span class="result-label">Calculated GPA:</span>
                <span id="calculatedGPA" class="result-value">0.00</span>
            </div>
        </div>
        
        <div id="errorMessage" class="error-message"></div>
    </div>
</body>
<script src="js1.js"></script>
</html>
